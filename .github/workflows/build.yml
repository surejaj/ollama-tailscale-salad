name: Build and push to GHCR

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      preload_model:
        description: "Ollama model to bake into the image (optional; large models may exceed runner disk)"
        required: false
        default: ""

env:
  REGISTRY: ghcr.io
  # Pushes to ghcr.io/<your-username-or-org>/ollama-tailscale-salad
  IMAGE_NAME: ${{ github.repository_owner }}/ollama-tailscale-salad

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # lets GITHUB_TOKEN push to GHCR
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pre-baking a model needs extra space on the ~14 GB runner disk.
      - name: Free up disk space
        if: ${{ github.event.inputs.preload_model != '' }}
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/lib/android \
                      /opt/hostedtoolcache/CodeQL /usr/local/share/boost
          sudo docker image prune --all --force || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            OLLAMA_PRELOAD_MODEL=${{ github.event.inputs.preload_model }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
